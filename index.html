<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penguin Calculator</title>
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="calculator-wrapper">
        <div class="calculator-body">
            <!-- Screen Section -->
            <section class="display-area">
                <div class="previous-math" id="previous-math"></div>
                <div class="current-value" id="current-value">0</div>
            </section>

            <!-- Input Section -->
            <section class="keypad">
                <!-- Row 1 -->
                <button class="btn btn-utility" id="clear">AC</button>
                <button class="btn btn-utility" id="backspace">DEL</button>
                <button class="btn btn-utility" id="percent">%</button>
                <button class="btn btn-operator" id="divide">÷</button>

                <!-- Row 2 -->
                <button class="btn btn-number">7</button>
                <button class="btn btn-number">8</button>
                <button class="btn btn-number">9</button>
                <button class="btn btn-operator" id="multiply">×</button>

                <!-- Row 3 -->
                <button class="btn btn-number">4</button>
                <button class="btn btn-number">5</button>
                <button class="btn btn-number">6</button>
                <button class="btn btn-operator" id="subtract">−</button>

                <!-- Row 4 -->
                <button class="btn btn-number">1</button>
                <button class="btn btn-number">2</button>
                <button class="btn btn-number">3</button>
                <button class="btn btn-operator" id="add">+</button>

                <!-- Row 5 -->
                <button class="btn btn-number btn-wide" id="zero">0</button>
                <button class="btn btn-number" id="decimal">.</button>
                <button class="btn btn-equals" id="equals">=</button>
            </section>
        </div>
    </main>
</body>
</html>
